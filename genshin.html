<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links - REVlonly</title>

    <link rel="icon" type="image/png" href="logo2.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        
        /* --- ANIMASI MASUK --- */
        @keyframes slideFromLeftToRight {
            from { opacity: 0; transform: translateX(-300px) rotate(-5deg); }
            to { opacity: 1; transform: translateX(0) rotate(2deg); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- ANIMASI KELUAR (BALIK KE UTAMA) --- */
        @keyframes slideOutToLeft {
            from { opacity: 1; transform: translateX(0) rotate(2deg); }
            to { opacity: 0; transform: translateX(-300px) rotate(-10deg); }
        }

        @keyframes fadeOutScale {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.9); }
        }

        .animate-profile-in { 
            animation: slideFromLeftToRight 1s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }
        
        .animate-menu-in { 
            animation: fadeInScale 0.8s ease-out 0.2s both; 
        }

        /* Class Trigger Balik */
        .exit-profile-back {
            animation: slideOutToLeft 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }

        .exit-menu-back {
            animation: fadeOutScale 0.5s ease-in forwards;
        }

        .btn-clean {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .btn-clean:hover {
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.15);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-white via-slate-100 to-sky-200 min-h-screen flex items-center justify-center p-4 md:p-10 relative overflow-x-hidden">

    <div class="absolute top-0 left-0 w-64 h-64 bg-sky-300/20 rounded-full blur-[100px] -z-10"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-blue-400/20 rounded-full blur-[120px] -z-10"></div>

    <div class="relative bg-white/70 backdrop-blur-xl w-full max-w-5xl min-h-[550px] md:h-auto rounded-[2.5rem] shadow-2xl flex flex-col-reverse md:flex-row overflow-hidden border border-white/50">

        <div id="menu-container" class="w-full md:w-[60%] p-6 md:p-12 flex flex-col justify-center space-y-4 animate-menu-in">
            
            <div class="mb-4 text-center">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Quick Menu</h2>
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mt-1">Professional Services</p>
            </div>

            <div class="grid grid-cols-1 gap-4 w-full">
                <a href="https://wa.me/6283191158298?text=Halooo%20saya%20mau%20order%20joki%20Min"
                    class="btn-clean flex items-center justify-center w-full px-6 py-4 rounded-2xl text-sky-500 font-extrabold hover:bg-sky-500 hover:text-white hover:scale-[1.02] active:scale-95 transition-all duration-300">
                    Order Joki
                </a>

                <a href="pricelist.html"
                    class="btn-clean flex items-center justify-center w-full px-6 py-4 rounded-2xl text-sky-500 font-extrabold hover:bg-sky-500 hover:text-white hover:scale-[1.02] active:scale-95 transition-all duration-300">
                    Price List Joki
                </a>

                <a href="https://www.tiktok.com/@kocheng_212?_r=1&_t=ZS-9542EhKgaxh"
                    class="btn-clean flex items-center justify-center w-full px-6 py-4 rounded-2xl text-sky-500 font-extrabold hover:bg-sky-500 hover:text-white hover:scale-[1.02] active:scale-95 transition-all duration-300">
                    TikTok
                </a>

                <a href="https://www.instagram.com/mch_r_a_a?igsh=cGM4jlmbWJ0YjQ4"
                    class="btn-clean flex items-center justify-center w-full px-6 py-4 rounded-2xl text-sky-500 font-extrabold hover:bg-sky-500 hover:text-white hover:scale-[1.02] active:scale-95 transition-all duration-300">
                    Instagram
                </a>

                <a href="index.html" id="back-to-main"
                    class="flex items-center justify-center w-full px-6 py-4 rounded-2xl bg-slate-800 text-white font-extrabold hover:bg-slate-900 hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl mt-4">
                    Kembali ke Menu Utama
                </a>
            </div>
        </div>

        <div id="profile-container" class="w-full md:w-[40%] bg-white/50 flex flex-col items-center justify-center p-8 border-t md:border-t-0 md:border-l border-white/60 animate-profile-in">
            <div class="relative group">
                <div class="absolute inset-0 bg-sky-400 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div class="relative w-32 h-32 md:w-48 md:h-48 rounded-[2rem] border-4 border-white shadow-2xl overflow-hidden rotate-2 group-hover:rotate-0 transition-all duration-500">
                    <img src="rem.jpeg" alt="REVlonly Profile" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="mt-8 text-center">
                <img src="logo.png" alt="REVlonly Logo" class="h-12 w-auto object-contain mx-auto drop-shadow-md">
                <div class="h-1.5 w-12 bg-sky-500 mx-auto mt-4 rounded-full"></div>
                
                <p class="mt-4 text-sky-600 font-extrabold text-[11px] tracking-[0.2em] uppercase italic px-4">
                    | Welcome to Gabut Impact |
                </p>
                
                <div class="mt-3 px-6">
                    <p class="text-slate-500 text-[12px] font-medium leading-relaxed">
                        Lagi nyari joki yang terpercaya?<br>
                        <span class="text-slate-600 font-bold">Keamanan akun terjamin 100%!</span>
                    </p>
                </div>
            </div>
            
            <p class="text-[9px] text-slate-400 uppercase tracking-[0.4em] text-center pt-8 font-bold hidden md:block">© REVlonly 2026</p>
        </div>

    </div>

    <script>
        // --- LOGIC ANIMASI BALIK KE UTAMA ---
        const btnBack = document.getElementById('back-to-main');
        const profileContainer = document.getElementById('profile-container');
        const menuContainer = document.getElementById('menu-container');

        btnBack.addEventListener('click', function(e) {
            e.preventDefault();
            const destination = this.href;

            // Jalankan animasi keluar (Geser balik ke kiri)
            profileContainer.classList.remove('animate-profile-in');
            profileContainer.classList.add('exit-profile-back');
            menuContainer.classList.add('exit-menu-back');

            // Delay pindah halaman sampai animasi selesai
            setTimeout(() => {
                window.location.href = destination;
            }, 700);
        });

        // Security shortcuts
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'i' || (e.shiftKey && e.key === 'I'))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
